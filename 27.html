<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>
body {
    font-family: Arial;
    background-color: lightgray;
    text-align: center;
}

.login-box {
    background-color: white;
    width: 300px;
    margin: 100px auto;
    padding: 20px;
    border-radius: 10px;
}

input {
    width: 90%;
    padding: 8px;
    margin: 10px;
}

button {
    padding: 10px;
    background-color: blue;
    color: white;
    border: none;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" placeholder="Username"><br>
    <input type="password" placeholder="Password"><br>

    <button>Login</button>
</div>

</body>
</html>
