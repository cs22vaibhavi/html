<!DOCTYPE html>
<html>
<head>
    <title>Flex Column</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            background-color: lightyellow;
            padding: 10px;
        }

        .box {
            background-color: orange;
            margin: 5px;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<h2>Flex Column Example</h2>

<div class="container">
    <div class="box">A</div>
    <div class="box">B</div>
    <div class="box">C</div>
</div>

</body>
</html>
