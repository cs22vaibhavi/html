<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .card {
            width: 300px;
            background: white;
            margin: 80px auto;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }

        .card h2 {
            margin: 10px 0;
        }

        .card p {
            color: gray;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: blue;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: darkblue;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://via.placeholder.com/100" alt="Profile">
    <h2>Your Name</h2>
    <p>Web Developer</p>
    <a href="#" class="btn">Contact Me</a>
</div>

</body>
</html>
