<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Example</title>
    <style>
        .container {
            display: flex;
            background-color: lightgray;
            padding: 10px;
        }

        .box {
            background-color: skyblue;
            margin: 10px;
            padding: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h2>Simple Flexbox Layout</h2>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

</body>
</html>
