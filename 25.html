<!DOCTYPE html>
<html>
<head>
    <title>My Hotel</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        .content {
            padding: 20px;
            text-align: center;
        }

        .room {
            background: white;
            margin: 10px;
            padding: 15px;
            border-radius: 10px;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Hotel</h1>
    <p>Best place to stay!</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Rooms</a>
    <a href="#">Contact</a>
</nav>

<div class="content">
    <h2>Our Rooms</h2>

    <div class="room">
        <h3>Deluxe Room</h3>
        <p>Comfortable room with AC and WiFi</p>
    </div>

    <div class="room">
        <h3>Suite Room</h3>
        <p>Luxury room with all facilities</p>
    </div>

</div>

<footer>
    <p>© 2026 My Hotel</p>
</footer>

</body>
</html>
