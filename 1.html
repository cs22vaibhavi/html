<!DOCTYPE html>
<html>
<head>
    <title>My Full Web Page</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            margin: 0;
        }
        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        section {
            padding: 20px;
        }
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 8px;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>My Website</h1>
    <p>Welcome to my web page</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<section>
    <h2>About Me</h2>
    <p>I am learning HTML and this is my practice page.</p>
</section>

<section>
    <h2>My Skills</h2>
    <ul>
        <li>HTML</li>
        <li>Python</li>
        <li>C Programming</li>
    </ul>
</section>

<section>
    <h2>Student Table</h2>
    <table>
        <tr>
            <th>Name</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>Ravi</td>
            <td>85</td>
        </tr>
        <tr>
            <td>Anu</td>
            <td>90</td>
        </tr>
    </table>
</section>

<section>
    <h2>Contact Form</h2>
    <form>
        Name: <input type="text"><br><br>
        Email: <input type="email"><br><br>
        Message:<br>
        <textarea rows="4" cols="30"></textarea><br><br>
        <input type="submit" value="Send">
    </form>
</section>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
