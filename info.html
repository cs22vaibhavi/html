<!DOCTYPE html>
<html>
<head>
  <title>Simple Table</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f9f9f9;
    }
    table {
      margin: 0 auto;
      border-collapse: collapse;
      width: 50%;
    }
    th, td {
      border: 1px solid #333;
      padding: 10px;
    }
    th {
      background-color: #4CAF50;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>

<h1>Student Marks Table</h1>

<table>
  <tr>
    <th>Name</th>
    <th>Subject</th>
    <th>Marks</th>
  </tr>
  <tr>
    <td>John</td>
    <td>Math</td>
    <td>85</td>
  </tr>
  <tr>
    <td>Mary</td>
    <td>Science</td>
    <td>92</td>
  </tr>
  <tr>
    <td>Alex</td>
    <td>English</td>
    <td>78</td>
  </tr>
</table>

</body>
</html>
